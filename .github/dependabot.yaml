version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      timezone: UTC
      time: "07:00"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      timezone: UTC
      time: "07:00"
    open-pull-requests-limit: 50
    groups:
      protobuf-es:
        patterns:
          - "@bufbuild/protobuf"
          - "@bufbuild/protoplugin"
          - "@bufbuild/protoc-gen-es"
      bench:
        patterns:
          - "google-protobuf"
          - "grpc-web"
          - "brotli"
          - "@bufbuild/protobuf"
          - "@bufbuild/protoc-gen-es"
          - "esbuild"
      build:
        patterns:
          - "typescript"
          - "tsx"
      lint-and-format:
        patterns:
          - "biome"
          - "@bufbuild/license-header"
          - "@arethetypeswrong/cli"
      webdriver:
        patterns:
          - "@wdio/*"
          - "webdriver"
          - "webdriverio"
  # The typescript-compat packages deliberately pin older versions of
  # typescript and @types/node to test compatibility. Only allow patch
  # updates for those two dependencies in these directories.
  - package-ecosystem: "npm"
    directories:
      - "/packages/typescript-compat/*"
    schedule:
      interval: "monthly"
      day: "monday"
      timezone: UTC
      time: "07:00"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
